
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################
#
#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#################
### AUTOSTART ###
#################

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

source=~/.config/hypr/mocha.conf
# Permite llamar al elevado de privilegios para montar discos
exec-once = systemctl --user start hyprpolkitagent

exec-once = hyprctl setcursor catppuccin-mocha-dark-cursors 28
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

exec-once=waybar & swaync & hyprpaper & hypridle
# Inicializa hyprsunset (activa o desactiva la proteccion de luz azul con comandos day y night con los binds de abajo)
exec-once = hyprsunset

# TODO: Deshabilitar por defecto el monitor TV
#exec-once = hyprctl keyword monitor "HDMI-A-1,disable"


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# DP-2 Monitor LG Widescreen, salia asi con el comando hyprctl monitors
# HDMI-A-1 es LG TV OLED
monitor=DP-2,preferred,0x0,1
monitor=HDMI-A-1,preferred,3440x0,1.6


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
# Set programs that you use
$terminal = ghostty
$fileManager = dolphin # o nautilus
$menu = wofi --show drun

#####################
### LOOK AND FEEL ###
#####################
# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general

xwayland {
    force_zero_scaling = true
}

# Some default env vars.
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us, latam
    kb_variant =
    kb_model = NUPHY Field75
    kb_options = grp:alt_space_toggle # Para cambiar entre entradas de idioma
    kb_rules =
    #kb_options = ctrl:nocaps # Honestamente no se que hace esto, pero interrumpia lo del toggle de entradas de idioma.

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    
    border_size = 3

    col.active_border = $mauve $flamingo 90deg
    col.inactive_border = $subtext0

    resize_on_border = true

    gaps_in = 4
    gaps_out = 8

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 4
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }

    shadow {
      color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true

    bezier = linear, 0.0, 0.0, 1, 1
    animation = borderangle, 1, 50, linear, loop

    animation=workspaces,1,0.5,default
    animation=windows,0,0.1,default
    animation=fade,0,0.1,default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

# master {
#     # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
#     new_is_master = true
# }


# TODO: Gestures cambiaron de sintaxis, no muy util en desktop, pero si en lapotp ... so, cambialo despues.
# gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
#    workspace_swipe = off
# }

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
# Para usar brave y que no pida la password al iniciar, asi como mostrar caracteres japoneses con
$browser = brave --password-store=basic --font-render-hinting=full --enable-font-antialiasing
$youtubeApp = pear-desktop # Tambien existe youtube-music-desktop-app

#pear-desktop -> https://github.com/pear-devs/pear-desktop
#youtube-music-desktop-app -> https://github.com/ytmdesktop/ytmdesktop

## CUSTOM BINDS
bind = $mainMod, h, exec, ~/.local/bin/hyprtogglehdmi # Toggle TV from monitors enabled
bind = $mainMod, c, exec, ~/.local/bin/t3chat # Open T3Chat if installed
bind = $mainMod, y, exec, $youtubeApp # Open Youtube Music App
bind = $mainMod ALT, B, exec, $browser # Open Web Browser

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
## BASIC COMMANDS
bind = $mainMod, return, exec, $terminal
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, space, exec, $menu
bind = $mainMod, l, exec, hyprlock
bind = $mainMod SHIFT, E, exec, bemoji # Seleccion de emojis rapidos yay -S bemoji
bind = $SUPER_SHIFT, R, exec, hyprctl reload

## SCREENSHOTS
bind = , Print, exec, hyprshot -m window
bind = shift, Print, exec, hyprshot -m region

## DWINDLES ?
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, U, togglesplit, #dwindle
bind = $mainMod, F, fullscreen, # dwindle
bind = $mainMod, W, togglegroup, # dwindle

## MOVE AROUND
# Move focus with mainMod + arrow keys
bind = $mainMod, j, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, i, movefocus, u
bind = $mainMod, k, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Move window position
bind = SUPER SHIFT, left, swapwindow, l
bind = SUPER SHIFT, right, swapwindow, r
bind = SUPER SHIFT, up, swapwindow, u
bind = SUPER SHIFT, down, swapwindow, d

# Resize active window
bind = SUPER, minus, resizeactive, -100 -0
bind = SUPER, plus, resizeactive, 100 0
bind = SUPER SHIFT, minus, resizeactive, 0 -100
bind = SUPER SHIFT, plus, resizeactive, 0 100

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia ... creo
# Requires playerctl
bindel = ,XF86AudioNext, exec, playerctl next
bindel = ,XF86AudioPause, exec, playerctl play-pause
bindel = ,XF86AudioPlay, exec, playerctl play-pause
bindel = ,XF86AudioPrev, exec, playerctl previous

# Brightness controls
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Esto tal vez haga conflicto con los de arriba con wpctl.
# Sound through pactl
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMut, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# Brightness through brightnessctl
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

###################################
###### WINDOWS AND WORKSPACES #####
###################################

# Evitar eventos maximize para apps que quieren maximizarse solas.
windowrulev = suppressevent = maximize, class:.*

# Evitar que se enfoquen las ventanas huérfanas o tooltips vacíos
windowrulev = nofocus = true, class:^$, title:^$, xwayland = true, floating = true, fullscreen = false, pinned = false

layerrule {
  name = no_anim_when_wofi_opens
  no_anim = on
  match:namespace = wofi
}
